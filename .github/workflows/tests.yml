name: tests

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Check Frontend Formatting
        run: npm run format:check

      - name: Check Frontend Lint
        run: npm run lint:check

      - name: Check Frontend Types
        run: npm run types:check

      - name: Run Type Analysis
        run: composer types:check

      - name: Tests
        run: php artisan test

  postgresql:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: exploria_testing
          POSTGRES_USER: exploria
          POSTGRES_PASSWORD: exploria-ci-only
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U exploria -d exploria_testing"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: exploria_testing
      DB_USERNAME: exploria
      DB_PASSWORD: exploria-ci-only

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Run PostgreSQL Migrations
        run: php artisan migrate:fresh --force --no-interaction

      - name: Run PostgreSQL Tests
        shell: bash
        run: |
          set -o pipefail
          php vendor/bin/phpunit -c phpunit.pgsql.xml --stop-on-failure 2>&1 | tee postgresql-test.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            {
              echo '### PostgreSQL test failure'
              echo '```text'
              tail -n 200 postgresql-test.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            details=$(tail -n 40 postgresql-test.log | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')
            echo "::error title=PostgreSQL test failure::$details"
          fi
          exit "$status"
