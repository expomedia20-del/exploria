openapi: 3.0.3
info:
  title: EXPLORIA Sprint 1 API
  version: 1.0.0
  description: API contract for Sprint 1 critical path: QR Scan -> PWA -> OTP -> Consent -> Attributed Scan Event.
servers:
  - url: https://api.exploria.local/api/v1
    description: Staging placeholder
security:
  - bearerAuth: []
paths:
  /auth/otp/request:
    post:
      tags: [Auth]
      summary: Request OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mobile]
              properties:
                mobile: { type: string, example: "09120000000" }
                sourceQrCode: { type: string, nullable: true }
      responses:
        '200':
          description: OTP request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpRequestResponse'
  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and create session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otpRequestId, code]
              properties:
                otpRequestId: { type: string, format: uuid }
                code: { type: string, example: "123456" }
                deviceId: { type: string, nullable: true }
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
  /consents/current:
    get:
      tags: [Consent]
      summary: Get active consent text
      security: []
      parameters:
        - in: query
          name: language
          schema: { type: string, default: fa }
      responses:
        '200':
          description: Current consent version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentVersion'
  /consents/accept:
    post:
      tags: [Consent]
      summary: Accept consent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [consentVersionId]
              properties:
                consentVersionId: { type: string, format: uuid }
                source: { type: string, default: pwa }
                venueId: { type: string, format: uuid, nullable: true }
      responses:
        '201':
          description: Consent log created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentLog'
  /admin/venues:
    post:
      tags: [Venue Admin]
      summary: Create venue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VenueCreate'
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Venue' } } } }
    get:
      tags: [Venue Admin]
      summary: List venues
      responses:
        '200': { description: List, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Venue' } } } } }
  /admin/venues/{venueId}/zones:
    post:
      tags: [Venue Admin]
      summary: Create zone under venue
      parameters:
        - $ref: '#/components/parameters/VenueId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ZoneCreate'
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Zone' } } } }
  /admin/zones/{zoneId}/hubs:
    post:
      tags: [Venue Admin]
      summary: Create hub under zone
      parameters:
        - in: path
          name: zoneId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HubCreate'
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Hub' } } } }
  /admin/touchpoints:
    post:
      tags: [Touchpoint Admin]
      summary: Create touchpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TouchpointCreate'
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Touchpoint' } } } }
  /admin/qr-codes:
    post:
      tags: [QR Admin]
      summary: Create QR code registry record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QrCodeCreate'
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/QrCode' } } } }
  /admin/qr-codes/export:
    get:
      tags: [QR Admin]
      summary: Export QR list for printing/install checklist
      responses:
        '200':
          description: Export rows
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/QrExportRow' }
  /scan/{qrCode}:
    post:
      tags: [Scan]
      summary: Scan QR and create attributed scan event
      security: []
      parameters:
        - in: path
          name: qrCode
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sessionToken: { type: string, nullable: true }
                deviceId: { type: string, nullable: true }
                source: { type: string, default: pwa }
      responses:
        '200':
          description: Scan processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanResponse'
  /admin/events/scan-log:
    get:
      tags: [Events]
      summary: Admin scan log
      responses:
        '200':
          description: Scan logs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ScanEvent' }
  /issues:
    post:
      tags: [Support]
      summary: Create issue or low-connectivity help request
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueCreate'
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Issue' } } } }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    VenueId:
      in: path
      name: venueId
      required: true
      schema: { type: string, format: uuid }
  schemas:
    OtpRequestResponse:
      type: object
      properties:
        otpRequestId: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
        status: { type: string, example: pending }
    AuthSession:
      type: object
      properties:
        userId: { type: string, format: uuid }
        sessionToken: { type: string }
        expiresAt: { type: string, format: date-time }
        consentRequired: { type: boolean }
    ConsentVersion:
      type: object
      properties:
        id: { type: string, format: uuid }
        version: { type: string }
        language: { type: string }
        title: { type: string }
        body: { type: string }
    ConsentLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        consentVersionId: { type: string, format: uuid }
        acceptedAt: { type: string, format: date-time }
    VenueCreate:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }
        city: { type: string }
        status: { type: string, default: draft }
    Venue:
      allOf:
        - $ref: '#/components/schemas/VenueCreate'
        - type: object
          properties: { id: { type: string, format: uuid } }
    ZoneCreate:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }
        status: { type: string, default: draft }
    Zone:
      allOf:
        - $ref: '#/components/schemas/ZoneCreate'
        - type: object
          properties: { id: { type: string, format: uuid }, venueId: { type: string, format: uuid } }
    HubCreate:
      type: object
      required: [code, name, hubType]
      properties:
        code: { type: string }
        name: { type: string }
        hubType: { type: string }
        status: { type: string, default: draft }
    Hub:
      allOf:
        - $ref: '#/components/schemas/HubCreate'
        - type: object
          properties: { id: { type: string, format: uuid }, zoneId: { type: string, format: uuid } }
    TouchpointCreate:
      type: object
      required: [hubId, code, label, type]
      properties:
        hubId: { type: string, format: uuid }
        code: { type: string }
        label: { type: string }
        type: { type: string }
        ownerType: { type: string, default: venue }
        status: { type: string, default: draft }
    Touchpoint:
      allOf:
        - $ref: '#/components/schemas/TouchpointCreate'
        - type: object
          properties: { id: { type: string, format: uuid } }
    QrCodeCreate:
      type: object
      required: [code, venueId, touchpointId, campaignId, destinationUrl]
      properties:
        code: { type: string }
        venueId: { type: string, format: uuid }
        touchpointId: { type: string, format: uuid }
        campaignId: { type: string, format: uuid }
        destinationUrl: { type: string }
        label: { type: string }
        status: { type: string, default: draft }
    QrCode:
      allOf:
        - $ref: '#/components/schemas/QrCodeCreate'
        - type: object
          properties: { id: { type: string, format: uuid } }
    QrExportRow:
      type: object
      properties:
        code: { type: string }
        label: { type: string }
        destinationUrl: { type: string }
        venueName: { type: string }
        touchpointLabel: { type: string }
        installNotes: { type: string }
    ScanResponse:
      type: object
      properties:
        scanEventId: { type: string, format: uuid }
        result: { type: string, enum: [accepted, invalid, expired, inactive, duplicate, rate_limited, offline_queued, error] }
        riskFlag: { type: boolean }
        nextAction: { type: string, example: open_campaign_entry }
        destinationUrl: { type: string, nullable: true }
        message: { type: string }
    ScanEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        qrCodeId: { type: string, format: uuid }
        venueId: { type: string, format: uuid }
        touchpointId: { type: string, format: uuid }
        result: { type: string }
        scannedAt: { type: string, format: date-time }
    IssueCreate:
      type: object
      required: [issueType, description]
      properties:
        issueType: { type: string }
        severity: { type: string, default: medium }
        venueId: { type: string, format: uuid, nullable: true }
        touchpointId: { type: string, format: uuid, nullable: true }
        description: { type: string }
    Issue:
      allOf:
        - $ref: '#/components/schemas/IssueCreate'
        - type: object
          properties: { id: { type: string, format: uuid }, status: { type: string, default: open } }
